<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quippet Settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     var(--tg-theme-bg-color, #0d0d0d);
            --text:   var(--tg-theme-text-color, #ffffff);
            --hint:   var(--tg-theme-hint-color, #8e8e93);
            --accent: var(--tg-theme-button-color, #3390ec);
            --card:   rgba(255,255,255,0.07);
            --div:    rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── PREVIEW ─────────────────────────────── */
        .top-pane {
            flex-shrink: 0;
            padding: 12px 0 10px;
            display: flex;
            justify-content: center;
            background: rgba(13,13,13,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--div);
            z-index: 20;
        }

        .preview-container {
            height: 210px;
            width: auto;
            aspect-ratio: 9/16;
            background: #111;
            border-radius: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.09);
            transition: transform 0.15s;
        }

        .preview-bg {
            position: absolute; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop');
            background-size: cover; background-position: center;
            filter: blur(20px) brightness(0.6);
            z-index: 0; transition: filter 0.3s ease;
        }

        .particle-layer {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
            mix-blend-mode: screen; z-index: 1;
            pointer-events: none; display: none;
        }

        .preview-cover {
            width: 74%; aspect-ratio: 1;
            position: absolute; top: 42%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 0 8px 28px rgba(0,0,0,0.7);
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop');
            background-size: cover;
            transition: border-radius 0.3s;
        }

        .preview-cover.vinyl {
            border-radius: 50% !important;
            animation: spin 4s linear infinite;
        }
        .preview-cover.vinyl::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            width: 18%; height: 18%;
            background: #111; border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes spin { 100% { transform: translate(-50%,-50%) rotate(360deg); } }

        .preview-logo {
            position: absolute; top: 86%; left: 50%;
            transform: translate(-50%, 0);
            width: 30%; height: auto;
            z-index: 5; opacity: 1;
            transition: opacity 0.5s ease;
            pointer-events: none;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
        }

        #vizCanvas {
            position: absolute; inset: 0;
            width: 100%; height: 100%; z-index: 3;
        }

        .preview-text {
            position: absolute; top: 68%;
            width: 100%; text-align: center;
            z-index: 4; pointer-events: none;
        }
        .p-artist { font-size: 6.8px; font-weight: 700; color: #fff; text-shadow: 0 1px 5px rgba(0,0,0,0.8); }
        .p-track  { font-size: 5.2px; color: rgba(255,255,255,0.7); margin-top: 2px; text-shadow: 0 1px 5px rgba(0,0,0,0.8); }

        /* ── SCROLL ───────────────────────────────── */
        .scrollable-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 16px 14px 100px;
            -webkit-overflow-scrolling: touch;
        }

        /* ── SECTION ──────────────────────────────── */
        .section { margin-bottom: 20px; }

        .sec-label {
            display: block;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: var(--hint);
            margin-bottom: 8px; margin-left: 4px;
        }

        /* ── PRESET CARDS ─────────────────────────── */
        .presets-row {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 7px;
        }

        .preset-card {
            background: var(--card);
            border-radius: 14px;
            padding: 12px 4px 10px;
            text-align: center; cursor: pointer;
            border: 1.5px solid transparent;
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            transition: all 0.17s;
        }
        .preset-card:active { transform: scale(0.93); }
        .preset-card.selected { background: rgba(51,144,236,0.13); border-color: var(--accent); }
        .preset-card .pc-emoji { font-size: 20px; line-height: 1; }
        .preset-card .pc-name  { font-size: 10px; font-weight: 600; }
        .preset-card.selected .pc-name { color: var(--accent); }

        /* ── SETTINGS BLOCK (grouped card) ───────── */
        .sblock {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
        }

        .srow {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; min-height: 52px;
            font-size: 14px; font-weight: 500;
        }
        .srow + .srow, .srow + .ssub, .ssub + .srow {
            border-top: 1px solid var(--div);
        }

        .srow-left { display: flex; align-items: center; gap: 9px; }
        .srow-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }

        /* ── SEGMENTED CONTROL ────────────────────── */
        .seg-wrap {
            display: flex; gap: 6px;
            padding: 10px 10px;
        }
        .seg-btn {
            flex: 1; border: none; border-radius: 10px;
            background: rgba(255,255,255,0.09);
            color: var(--hint);
            font-size: 11px; font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            padding: 8px 4px;
            transition: all 0.17s;
        }
        .seg-btn:active { transform: scale(0.93); }
        .seg-btn.selected { background: var(--accent); color: #fff; }
        .seg-btn .si { font-size: 16px; }

        /* ── PARTICLE GRID ────────────────────────── */
        .particle-grid {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 7px;
        }

        .part-card {
            background: var(--card);
            border-radius: 14px;
            padding: 11px 4px 9px;
            text-align: center; cursor: pointer;
            border: 1.5px solid transparent;
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            transition: all 0.17s;
        }
        .part-card:active { transform: scale(0.93); }
        .part-card.selected { background: rgba(51,144,236,0.13); border-color: var(--accent); }
        .part-card .pe { font-size: 18px; }
        .part-card .pn { font-size: 10px; font-weight: 600; }
        .part-card.selected .pn { color: var(--accent); }

        /* ── COLOR ROW ────────────────────────────── */
        .color-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 16px; min-height: 52px;
            font-size: 14px; font-weight: 500;
            border-top: 1px solid var(--div);
            position: relative; cursor: pointer;
        }
        .color-swatch {
            width: 26px; height: 26px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.22); flex-shrink: 0;
        }
        input[type="color"] {
            position: absolute; opacity: 0; inset: 0;
            width: 100%; height: 100%; cursor: pointer;
        }

        /* ── SUB SLIDER ───────────────────────────── */
        .ssub {
            padding: 6px 16px 14px;
            border-top: 1px solid var(--div);
        }
        .ssub.hidden { display: none; }

        .range-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--hint);
            margin-bottom: 10px;
        }
        .range-header .rval { font-weight: 700; color: var(--text); }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; background: transparent; cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px; border-radius: 50%;
            background: #fff; cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.35);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer;
            background: rgba(255,255,255,0.18); border-radius: 2px;
        }

        /* ── TOGGLE ───────────────────────────────── */
        .toggle { position: relative; display: inline-block; width: 44px; height: 26px; flex-shrink: 0; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .sw {
            position: absolute; inset: 0; cursor: pointer;
            background: #3a3a3c; border-radius: 34px; transition: .25s;
        }
        .sw:before {
            position: absolute; content: "";
            height: 22px; width: 22px; left: 2px; bottom: 2px;
            background: #fff; border-radius: 50%; transition: .25s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input:checked + .sw { background: var(--accent); }
        input:checked + .sw:before { transform: translateX(18px); }

        /* ── BOTTOM BAR ───────────────────────────── */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 10px 14px 22px;
            background: linear-gradient(0deg, var(--bg) 55%, transparent 100%);
            z-index: 100;
        }

        .main-btn {
            width: 100%; border: none;
            background: var(--accent); color: #fff;
            padding: 15px; border-radius: 14px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            cursor: pointer; letter-spacing: 0.2px;
            box-shadow: 0 4px 20px -4px rgba(51,144,236,0.5);
            transition: transform 0.12s, opacity 0.12s;
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.9; }
    </style>
</head>
<body>

    <!-- PREVIEW -->
    <div class="top-pane">
        <div class="preview-container" id="previewBox">
            <div class="preview-bg" id="bgEl"></div>
            <img id="particleImg" class="particle-layer" src="" alt="">
            <img id="logoEl" class="preview-logo" src="spotify.png" alt="">
            <div class="preview-cover" id="coverEl"></div>
            <div class="preview-text">
                <div class="p-artist">ARTIST</div>
                <div class="p-track">Track Name</div>
            </div>
            <canvas id="vizCanvas"></canvas>
        </div>
    </div>

    <div class="scrollable-content">

        <!-- 1. ГОТОВЫЕ СТИЛИ -->
        <div class="section">
            <span class="sec-label">Готовые стили</span>
            <div class="presets-row">
                <div class="preset-card" id="preset-phonk" onclick="applyPreset('phonk')">
                    <span class="pc-emoji">😈</span><span class="pc-name">Phonk</span>
                </div>
                <div class="preset-card" id="preset-lofi" onclick="applyPreset('lofi')">
                    <span class="pc-emoji">☕</span><span class="pc-name">Lo-Fi</span>
                </div>
                <div class="preset-card" id="preset-neon" onclick="applyPreset('neon')">
                    <span class="pc-emoji">👾</span><span class="pc-name">Neon</span>
                </div>
                <div class="preset-card" id="preset-clean" onclick="applyPreset('clean')">
                    <span class="pc-emoji">✨</span><span class="pc-name">Clean</span>
                </div>
            </div>
        </div>

        <!-- 2. ВИЗУАЛИЗАТОР -->
        <div class="section">
            <span class="sec-label">Визуализатор</span>
            <div class="sblock">
                <!-- Тип -->
                <div class="seg-wrap">
                    <button class="seg-btn selected" id="btn-spectrum" onclick="setMode('spectrum')">
                        <span class="si">📊</span>Спектр
                    </button>
                    <button class="seg-btn" id="btn-bar" onclick="setMode('bar')">
                        <span class="si">➖</span>Линия
                    </button>
                    <button class="seg-btn" id="btn-circle" onclick="setMode('circle')">
                        <span class="si">⭕</span>Круг
                    </button>
                </div>
                <!-- Цвет -->
                <div class="color-row">
                    <span>Цвет элементов</span>
                    <div class="color-swatch" id="colorPreview" style="background:#ffffff;"></div>
                    <input type="color" id="colorInp" value="#ffffff" oninput="updateColor(this.value)">
                </div>
                <!-- Плотность (скрыта в режиме Линия) -->
                <div class="ssub" id="barsContainer">
                    <div class="range-header">
                        <span>Плотность</span>
                        <span class="rval" id="barsVal">25</span>
                    </div>
                    <input type="range" min="5" max="120" value="25" id="barsRange" oninput="updateBars(this.value)">
                </div>
            </div>
        </div>

        <!-- 3. ОБЛОЖКА -->
        <div class="section">
            <span class="sec-label">Обложка</span>
            <div class="sblock">
                <div class="srow">
                    <div class="srow-left">
                        <span class="srow-icon">💿</span>
                        <span>Виниловая пластинка</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="vinylCheck" onchange="toggleVinyl()">
                        <span class="sw"></span>
                    </label>
                </div>
                <div class="ssub" id="roundContainer">
                    <div class="range-header">
                        <span>Скругление углов</span>
                        <span class="rval" id="roundVal">20</span>
                    </div>
                    <input type="range" min="0" max="150" value="20" id="roundRange" oninput="updateRound(this.value)">
                </div>
            </div>
        </div>

        <!-- 4. ЧАСТИЦЫ -->
        <div class="section">
            <span class="sec-label">Частицы</span>
            <div class="particle-grid">
                <div class="part-card selected" id="part-none" onclick="setParticle('none')">
                    <span class="pe">🚫</span><span class="pn">Нет</span>
                </div>
                <div class="part-card" id="part-tape" onclick="setParticle('tape')">
                    <span class="pe">🎞️</span><span class="pn">Плёнка</span>
                </div>
                <div class="part-card" id="part-sparks" onclick="setParticle('sparks')">
                    <span class="pe">🔥</span><span class="pn">Искры</span>
                </div>
                <div class="part-card" id="part-snow" onclick="setParticle('snow')">
                    <span class="pe">❄️</span><span class="pn">Снег</span>
                </div>
            </div>
        </div>

        <!-- 5. ЭФФЕКТЫ -->
        <div class="section">
            <span class="sec-label">Эффекты</span>
            <div class="sblock">
                <div class="srow">
                    <div class="srow-left">
                        <span class="srow-icon">💧</span>
                        <span>Размытие фона</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="blurCheck" onchange="toggleBlur()">
                        <span class="sw"></span>
                    </label>
                </div>
                <div class="ssub" id="blurRangeBox">
                    <div class="range-header">
                        <span>Сила размытия</span>
                        <span class="rval" id="blurVal">30</span>
                    </div>
                    <input type="range" min="0" max="100" value="30" id="blurRange" oninput="updateBlurVal(this.value)">
                </div>
                <div class="srow">
                    <div class="srow-left">
                        <span class="srow-icon">🫨</span>
                        <span>Тряска под басс</span>
                    </div>
                    <label class="toggle">
                        <input type="checkbox" id="shakeCheck" onchange="toggleShake()">
                        <span class="sw"></span>
                    </label>
                </div>
                <div class="ssub hidden" id="shakeRangeBox">
                    <div class="range-header">
                        <span>Интенсивность</span>
                        <span class="rval" id="shakeVal">20</span>
                    </div>
                    <input type="range" min="5" max="50" value="20" id="shakeRange" oninput="updateShakeVal(this.value)">
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-bar">
        <button class="main-btn" onclick="sendData()">Создать видео</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = {
            mode: 'spectrum', color: '#ffffff', vinyl: false,
            shake: false, shakePower: 20,
            bars: 25, round: 20,
            blur: true, blurPower: 30,
            particle: 'none'
        };

        const particleSources = { none: '', tape: 'tape.gif', sparks: 'sparks.gif', snow: 'snow.gif' };

        const canvas   = document.getElementById('vizCanvas');
        const ctx      = canvas.getContext('2d');
        const coverEl  = document.getElementById('coverEl');
        const previewBox = document.getElementById('previewBox');
        const bgEl     = document.getElementById('bgEl');
        const partImg  = document.getElementById('particleImg');
        const logoEl   = document.getElementById('logoEl');
        const colorPreview = document.getElementById('colorPreview');

        // Logo cycle
        const logoSources = ['spotify.png', 'apple.png', 'VK.png', 'yandex.png'];
        let currentLogoIdx = 0;
        function cycleLogos() {
            logoEl.style.opacity = 0;
            setTimeout(() => {
                currentLogoIdx = (currentLogoIdx + 1) % logoSources.length;
                logoEl.src = logoSources[currentLogoIdx];
                logoEl.style.opacity = 1;
            }, 500);
        }
        setInterval(cycleLogos, 3000);

        function haptic() { if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }

        // Canvas resize
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = previewBox.clientWidth  * dpr;
            canvas.height = previewBox.clientHeight * dpr;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ── PRESETS ──────────────────────────────────────
        const presets = {
            phonk: { mode: 'bar',      color: '#ff0000', vinyl: true,  shake: true,  shakePower: 30, bars: 15, round: 0,   blur: true,  blurPower: 20, particle: 'tape'   },
            lofi:  { mode: 'circle',   color: '#ffb6c1', vinyl: true,  shake: false, shakePower: 20, bars: 50, round: 20,  blur: true,  blurPower: 40, particle: 'snow'   },
            neon:  { mode: 'spectrum', color: '#00ff00', vinyl: false, shake: true,  shakePower: 15, bars: 40, round: 10,  blur: true,  blurPower: 30, particle: 'sparks' },
            clean: { mode: 'spectrum', color: '#ffffff', vinyl: false, shake: false, shakePower: 20, bars: 25, round: 20,  blur: false, blurPower: 0,  particle: 'none'   }
        };

        function applyPreset(name) {
            haptic();
            state = { ...state, ...presets[name] };

            // Highlight preset card
            document.querySelectorAll('.preset-card').forEach(b => b.classList.remove('selected'));
            document.getElementById('preset-' + name).classList.add('selected');

            setMode(state.mode, false);
            updateColor(state.color, false);
            document.getElementById('colorInp').value = state.color;

            document.getElementById('vinylCheck').checked  = state.vinyl;  toggleVinyl(false);
            document.getElementById('shakeCheck').checked  = state.shake;  toggleShake(false);
            document.getElementById('blurCheck').checked   = state.blur;   toggleBlur(false);

            updateShakeVal(state.shakePower); document.getElementById('shakeRange').value = state.shakePower;
            updateBars(state.bars);           document.getElementById('barsRange').value  = state.bars;
            updateRound(state.round);         document.getElementById('roundRange').value  = state.round;
            updateBlurVal(state.blurPower);   document.getElementById('blurRange').value  = state.blurPower;

            setParticle(state.particle, false);
        }

        // ── PARTICLES ─────────────────────────────────────
        function setParticle(name, doHaptic = true) {
            if (doHaptic) haptic();
            state.particle = name;
            ['none','tape','sparks','snow'].forEach(p => {
                document.getElementById('part-' + p).classList.toggle('selected', p === name);
            });
            if (name === 'none') { partImg.style.display = 'none'; partImg.src = ''; }
            else                 { partImg.src = particleSources[name]; partImg.style.display = 'block'; }
        }

        // ── MODE ──────────────────────────────────────────
        function setMode(mode, doHaptic = true) {
            if (doHaptic) haptic();
            state.mode = mode;
            ['spectrum','bar','circle'].forEach(m =>
                document.getElementById('btn-' + m).classList.toggle('selected', m === mode)
            );
            document.getElementById('barsContainer').classList.toggle('hidden', mode === 'bar');
        }

        // ── BLUR ──────────────────────────────────────────
        function toggleBlur(doHaptic = true) {
            if (doHaptic) haptic();
            state.blur = document.getElementById('blurCheck').checked;
            document.getElementById('blurRangeBox').classList.toggle('hidden', !state.blur);
            updateBgStyle();
        }
        function updateBlurVal(val) {
            state.blurPower = parseInt(val);
            document.getElementById('blurVal').innerText = val;
            updateBgStyle();
        }
        function updateBgStyle() {
            bgEl.style.filter = `blur(${state.blur ? state.blurPower : 0}px) brightness(0.6)`;
        }

        // Init blur
        document.getElementById('blurCheck').checked = state.blur;
        toggleBlur(false);

        // ── VINYL ─────────────────────────────────────────
        function toggleVinyl(doHaptic = true) {
            if (doHaptic) haptic();
            state.vinyl = document.getElementById('vinylCheck').checked;
            coverEl.classList.toggle('vinyl', state.vinyl);
            document.getElementById('roundContainer').classList.toggle('hidden', state.vinyl);
            if (!state.vinyl) coverEl.style.borderRadius = (state.round / 4) + 'px';
            else              coverEl.style.borderRadius = '';
        }

        // ── SHAKE ─────────────────────────────────────────
        function toggleShake(doHaptic = true) {
            if (doHaptic) haptic();
            state.shake = document.getElementById('shakeCheck').checked;
            document.getElementById('shakeRangeBox').classList.toggle('hidden', !state.shake);
        }

        // ── VALUE UPDATERS ────────────────────────────────
        function updateRound(val) {
            state.round = parseInt(val);
            document.getElementById('roundVal').innerText = val;
            if (!state.vinyl) coverEl.style.borderRadius = (val / 4) + 'px';
        }
        function updateColor(val, doHaptic = false) {
            state.color = val;
            colorPreview.style.backgroundColor = val;
            if (doHaptic) haptic();
        }
        function updateShakeVal(val) { state.shakePower = parseInt(val); document.getElementById('shakeVal').innerText = val; }
        function updateBars(val)     { state.bars = parseInt(val);      document.getElementById('barsVal').innerText  = val; }

        // ── DRAW ──────────────────────────────────────────
        function draw() {
            const dpr = window.devicePixelRatio || 1;
            if (canvas.width !== previewBox.clientWidth * dpr) resizeCanvas();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowBlur = 0;
            ctx.fillStyle   = state.color;
            ctx.strokeStyle = state.color;

            // Shake preview
            if (state.shake && Math.random() > 0.8) {
                const offset = (Math.random() - 0.5) * (state.shakePower / 4);
                previewBox.style.transform = `scale(0.99) translate(${offset}px,${offset}px)`;
            } else {
                previewBox.style.transform = 'scale(1)';
            }

            const W = canvas.width;
            const H = canvas.height;
            const groundLevel = H * 0.82;

            if (state.mode === 'spectrum') {
                const bars = state.bars;
                const slotW = W / bars;
                const gap   = Math.max(0.5, slotW * 0.047);
                const bw    = Math.max(1, slotW - gap * 2);
                for (let i = 0; i < bars; i++) {
                    const h  = Math.random() * (H * 0.052) + (H * 0.016);
                    const x1 = i * slotW + gap;
                    ctx.fillRect(x1, groundLevel - h, bw, h);
                }

            } else if (state.mode === 'bar') {
                const progress = (Date.now() % 4000) / 4000;
                const barH = Math.max(3, H * 0.005);
                ctx.fillRect(0, groundLevel, W * progress, barH);

            } else if (state.mode === 'circle') {
                const cx = W / 2;
                const cy = H * 0.42;
                const radius = (W * 0.74) / 2;
                ctx.lineWidth = Math.max(2 * dpr, 4 * dpr);
                ctx.lineCap   = 'butt';
                const step = (Math.PI * 2) / state.bars;
                for (let i = 0; i < state.bars; i++) {
                    const len   = Math.random() * H * 0.052 + H * 0.01;
                    const angle = i * step - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(angle) * radius,         cy + Math.sin(angle) * radius);
                    ctx.lineTo(cx + Math.cos(angle) * (radius + len), cy + Math.sin(angle) * (radius + len));
                    ctx.stroke();
                }
            }

            requestAnimationFrame(draw);
        }
        draw();

        // ── SEND ──────────────────────────────────────────
        function sendData() { haptic(); tg.sendData(JSON.stringify(state)); }
    </script>
</body>
